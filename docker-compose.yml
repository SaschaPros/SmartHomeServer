services:
  smarthome:
    container_name: server
    hostname: smarthome
    build: ./
    restart: always
    environment:
      # Port Tomcat binds to *inside* the container. Rarely needs changing.
      - SERVER_PORT=${SERVER_PORT:-3000}
    ports:
      # <published host port>:<container port>
      # PORT is the port you reach the server on from the network (Home Assistant etc.).
      # The container side always follows SERVER_PORT so the two can never drift apart.
      - ${PORT:-3000}:${SERVER_PORT:-3000}
